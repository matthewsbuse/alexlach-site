<script>
  // Configuration
  // Set this to your webhook/API endpoint to receive form submissions
  const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbwMYb0kuhggxp09mInplaHYwaairkOob7IDuF54R9pJCNOy5Nopu43G4q7Alb-3lYyA/exec";

  // State
  const state = {
    currentStep: 0,
    answers: {
      occupation: null,
      income: null,
      commitment: null,
      prenom: '',
      nom: '',
      email: '',
      telephone: '',
      message: ''
    }
  };

  // Navigation
  function goToStep(n) {
    document.querySelectorAll('section[data-step]').forEach(s => s.classList.remove('active'));
    const target = document.querySelector(`section[data-step="${n}"]`);
    if (target) {
      target.classList.add('active');
      state.currentStep = n;
      window.scrollTo(0, 0);
    }
  }

  function goBack() {
    if (state.currentStep > 0) {
      goToStep(state.currentStep - 1);
    }
  }

  // Form Validation
  function validateForm() {
    const prenom = document.getElementById('prenom').value.trim();
    const nom = document.getElementById('nom').value.trim();
    const email = document.getElementById('email').value.trim();
    const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    document.getElementById('btnSubmit').disabled = !(prenom && nom && emailValid);
  }

  // Init
  document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('btnStart').addEventListener('click', function () {
      goToStep(1);
    });

    document.querySelectorAll('.option-card').forEach(function (card) {
      card.addEventListener('click', function () {
        const key = this.dataset.answer;
        state.answers[key] = this.dataset.value;
        goToStep(state.currentStep + 1);
      });
    });

    document.querySelectorAll('[data-back]').forEach(function (btn) {
      btn.addEventListener('click', goBack);
    });

    const numberBtns = document.querySelectorAll('.number-btn');
    numberBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        numberBtns.forEach(function (b) { b.classList.remove('selected'); });
        this.classList.add('selected');
        state.answers.commitment = this.dataset.num;
        document.getElementById('btnContinue').disabled = false;
      });
    });

    document.getElementById('btnContinue').addEventListener('click', function () {
      goToStep(4);
    });

    ['prenom', 'nom', 'email'].forEach(function (id) {
      document.getElementById(id).addEventListener('input', validateForm);
    });

    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();

      state.answers.prenom = document.getElementById('prenom').value.trim();
      state.answers.nom = document.getElementById('nom').value.trim();
      state.answers.email = document.getElementById('email').value.trim();
      state.answers.telephone = document.getElementById('telephone').value.trim();
      state.answers.message = document.getElementById('message').value.trim();

      const section = document.querySelector('section[data-step="4"]');

      if (API_ENDPOINT) {
        document.getElementById('btnSubmit').disabled = true;
        document.getElementById('btnSubmit').textContent = 'Envoi en cours...';

        fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(state.answers)
        })
          .then(function (res) {
            if (!res.ok) throw new Error('Erreur réseau');
            showSuccess(section);
          })
          .catch(function () {
            document.getElementById('btnSubmit').disabled = false;
            document.getElementById('btnSubmit').textContent = 'Envoyer la demande';
            alert('Une erreur est survenue. Veuillez réessayer.');
          });
      } else {
        console.log('Submission:', state.answers);
        showSuccess(section);
      }
    });
  });

  function showSuccess(section) {
    section.innerHTML =
      '<div class="success-message">' +
      '<h2>Merci !</h2>' +
      '<p>Ta demande a été envoyée avec succès.<br>On te revient très bientôt.</p>' +
      '</div>';
  }
</script>
